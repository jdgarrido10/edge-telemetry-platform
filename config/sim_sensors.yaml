sensores:

  - sensor_id: planta1.maquina1.temperatura
    tipo: temperatura
    sim:
      base: 65.0
      drift_rate: 0.003
      drift_limit: 5.0
      noise_sigma: 0.15
      op_min: 55.0
      op_max: 75.0

  - sensor_id: planta1.maquina1.presion
    tipo: presion
    sim:
      base: 4.5
      amplitude: 0.4
      period: 180.0
      rise_fraction: 0.25
      noise_sigma: 0.04
      op_min: 3.5
      op_max: 5.5

  - sensor_id: planta1.maquina1.vibracion
    tipo: vibracion
    sim:
      base: 0.45
      noise_sigma: 0.03
      op_min: 0.0
      op_max: 2.0
      fault:
        enabled: true
        start_offset_s: 15
        duration_s: 30
        harmonic_amplitude: 0.60
        harmonic_period: 12.0

  - sensor_id: planta1.maquina2.temperatura
    tipo: temperatura
    sim:
      base: 80.0
      drift_rate: 0.005
      drift_limit: 8.0
      noise_sigma: 0.4
      op_min: 70.0
      op_max: 92.0
      degradation:
        enabled: false
        start_offset_s: 180
        noise_growth_rate: 0.002
        drift_growth_rate: 0.001

  - sensor_id: planta1.maquina2.velocidad
    tipo: velocidad_discreta
    sim:
      niveles: [800.0, 1200.0, 1600.0, 2000.0]
      nivel_inicial: 1
      prob_cambio: 0.04
      noise_sigma: 5.0
      op_min: 700.0
      op_max: 2100.0

# ─── Ventanas de calidad BAD programables ─────────────────────────────────────
fault_windows:

  - sensor_id: planta1.maquina1.presion
    start_offset_s: 20
    duration_s: 15
    reason: "mantenimiento_valvula"

  - sensor_id: planta1.maquina2.temperatura
    start_offset_s: 50
    duration_s: 20
    reason: "perdida_comunicacion"

  - sensor_id: planta1.maquina1.vibracion
    start_offset_s: 60
    duration_s: 15
    reason: "fallo_comunicacion"